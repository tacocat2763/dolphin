name: Windows Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build_windows:
    name: Build and package (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Confirm edited DualShockUDPClient files are present
        shell: pwsh
        run: |
          Write-Host "Listing files in Source/Core/InputCommon/ControllerInterface/DualShockUDPClient* (if present)"
          $p = Join-Path $PWD 'Source\Core\InputCommon\ControllerInterface'
          if (Test-Path $p) {
            Get-ChildItem -Path $p -Filter 'DualShockUDPClient*' -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Directory not found: $p"
          }
          Write-Host "Ensure your two edited files are committed; the workflow will build whatever is in the repo."

      - name: Install vcpkg (for consistent dependencies)
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          & .\vcpkg\bootstrap-vcpkg.bat
          & .\vcpkg\vcpkg integrate install

      - name: Install common dependencies via vcpkg
        shell: pwsh
        run: |
          # Edit this list to match Dolphin's dependencies if needed
          .\vcpkg\vcpkg install fmt:x64-windows sqlite3:x64-windows zlib:x64-windows libpng:x64-windows libjpeg-turbo:x64-windows glew:x64-windows

      - name: Configure CMake (Visual Studio generator, x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_TOOLCHAIN_FILE="$PWD\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DCMAKE_CXX_STANDARD=17 `
            -DDOLPHIN_BUILD_TESTS=OFF `
            -DUNICODE=ON `
            -Wdev `
            -DCMAKE_POLICY_DEFAULT_CMP0074=NEW

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config $env:BUILD_TYPE -- /m

      - name: (Optional) Run tests if available
        if: success()
        shell: pwsh
        run: |
          if (Test-Path build\CTestTestfile.cmake) {
            ctest --test-dir build --output-on-failure -C $env:BUILD_TYPE
          } else {
            Write-Host "No tests detected (no CTestTestfile). Skipping."
          }

      - name: Package build outputs
        id: package
        shell: pwsh
        run: |
          $outdir = Join-Path $PWD 'release'
          if (Test-Path $outdir) { Remove-Item -Recurse -Force $outdir }
          New-Item -ItemType Directory -Path $outdir | Out-Null
          $possibleBins = @(
            Join-Path $PWD 'build\bin\Release\*' ,
            Join-Path $PWD 'build\bin\*' ,
            Join-Path $PWD 'build\*'
          )
          $found = $false
          foreach ($p in $possibleBins) {
            try {
              Copy-Item -Path $p -Destination $outdir -Recurse -Force -ErrorAction Stop
              $found = $true
            } catch {
              # ignore missing patterns
            }
          }
          if (-not $found) {
            Copy-Item -Path (Join-Path $PWD 'build') -Destination $outdir -Recurse -Force
          }
          $tag = '${{ github.ref_name }}'
          if (-not $tag) { $tag = 'run-' + $env:GITHUB_RUN_ID }
          $zipName = "dolphin-$tag-windows-x64.zip"
          Compress-Archive -Path (Join-Path $outdir '*') -DestinationPath $zipName -Force
          Write-Host "zip=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: Automated Windows build (generated by workflow)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.zip }}
          asset_name: ${{ env.zip }}
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
